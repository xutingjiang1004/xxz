<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>液态玻璃小圈子</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
    }

    /* 彩色Blob流体背景 */
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3), transparent 40%),
                  radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3), transparent 40%),
                  radial-gradient(circle at 40% 40%, rgba(119, 209, 255, 0.2), transparent 40%),
                  #1a1a2e;
      background-attachment: fixed;
      overflow-x: hidden;
      padding-bottom: 80px;
    }

    /* 顶部玻璃导航栏 */
    .glass-nav {
      position: sticky;
      top: 0;
      z-index: 999;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.2);
      padding: 18px 20px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
    }

    .glass-nav h1 {
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      opacity: 0.95;
    }

    /* 玻璃卡片通用样式 */
    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      margin: 16px;
      padding: 22px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      animation: fadeIn 0.5s ease forwards;
    }

    /* 入场动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 输入框 */
    .glass-input {
      width: 100%;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 10px 0;
      color: #fff;
      font-size: 15px;
      outline: none;
    }

    .glass-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    /* 玻璃按钮 */
    .glass-btn {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 500;
      float: right;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .glass-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .glass-btn:active {
      transform: translateY(0);
    }

    .clearfix::after {
      content: "";
      clear: both;
      display: table;
    }

    /* 动态卡片 */
    .post-card {
      color: #fff;
      opacity: 0.95;
    }

    .post-user {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(90deg, #6366f1, #ec4899);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      margin-right: 12px;
    }

    .post-content {
      line-height: 1.6;
      margin: 16px 0;
      font-size: 15px;
    }

    /* 交互栏 */
    .action-bar {
      display: flex;
      gap: 24px;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .action {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }

    .action:hover {
      color: #fff;
      transform: scale(1.05);
    }

    /* 评论区 */
    .comment-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }

    .comment-name {
      color: #a78bfa;
      font-weight: 500;
    }

    .comment-input-box {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    /* Toast轻提示 */
    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 空状态 */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.4);
      font-size: 15px;
    }
  </style>
</head>

<body>
  <!-- 顶部导航 -->
  <div class="glass-nav">
    <h1>✨ 液态玻璃小圈子</h1>
  </div>

  <!-- 发布面板 -->
  <div class="glass-card clearfix">
    <input class="glass-input" id="nickname" placeholder="你的昵称">
    <textarea class="glass-input" id="content" rows="3" placeholder="分享你的动态..."></textarea>
    <button class="glass-btn" onclick="publishPost()">发布动态</button>
  </div>

  <!-- 动态列表 -->
  <div id="postList"></div>

  <!-- Toast提示 -->
  <div class="toast" id="toast"></div>

  <script>
    // 全局变量
    let toastTimer = null;

    // 页面加载
    window.onload = () => { loadPosts() };

    // Toast提示（替代alert）
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2000);
    }

    // 加载动态
    async function loadPosts() {
      try {
        const res = await fetch('/api/posts');
        const data = await res.json();
        renderPosts(data.data || []);
      } catch (e) { showToast('加载失败'); }
    }

    // 渲染动态
    function renderPosts(posts) {
      const list = document.getElementById('postList');
      if (posts.length === 0) {
        list.innerHTML = '<div class="empty">暂无动态，快来发布第一条吧～</div>';
        return;
      }

      let html = '';
      posts.forEach(p => {
        const time = new Date(p.createTime).toLocaleString();
        let comments = '';
        p.comments.forEach(c => {
          comments += `<div class="comment-item"><span class="comment-name">${c.nickname}</span>：${c.content}</div>`;
        });

        html += `
        <div class="glass-card post-card">
          <div class="post-user">
            <div class="avatar">${p.nickname.charAt(0) || '匿'}</div>
            <div>
              <div>${p.nickname}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.5)">${time}</div>
            </div>
          </div>
          <div class="post-content">${p.content}</div>
          <div class="action-bar">
            <div class="action" onclick="like(${p.id})">👍 ${p.like}</div>
            <div class="action" onclick="view(${p.id})">👀 ${p.view}</div>
            <div class="action">💬 ${p.comments.length}</div>
          </div>
          <div style="margin-top:12px">${comments}</div>
          <div class="comment-input-box">
            <input class="glass-input" style="flex:0.3" id="c_nick_${p.id}" placeholder="昵称">
            <input class="glass-input" style="flex:1" id="c_text_${p.id}" placeholder="发表评论...">
            <button class="glass-btn" style="padding:10px 16px" onclick="comment(${p.id})">发送</button>
          </div>
        </div>`;
      });
      list.innerHTML = html;
    }

    // 发布动态
    async function publishPost() {
      const nickname = document.getElementById('nickname').value.trim();
      const content = document.getElementById('content').value.trim();
      if (!content) return showToast('请输入内容');

      await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname, content })
      });
      showToast('发布成功 ✅');
      document.getElementById('content').value = '';
      loadPosts();
    }

    // 点赞
    async function like(id) {
      await fetch(`/api/posts/${id}/like`, { method: 'POST' });
      loadPosts();
    }

    // 浏览量
    async function view(id) {
      await fetch(`/api/posts/${id}/view`, { method: 'POST' });
    }

    // 评论
    async function comment(id) {
      const nick = document.getElementById(`c_nick_${id}`).value.trim();
      const text = document.getElementById(`c_text_${id}`).value.trim();
      if (!text) return showToast('请输入评论');

      await fetch(`/api/posts/${id}/comment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nickname: nick, content: text })
      });
      showToast('评论成功');
      loadPosts();
    }
  </script>
</body>
</html>
