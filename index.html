<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理系统 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container { width: 100%; max-width: 400px; padding: 20px; }
    .login-box, .dashboard-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .dashboard-box { display: none; max-width: 800px; }
    h1 { color: #2c3e50; margin-bottom: 30px; text-align: center; font-size: 28px; }
    h2 { color: #2c3e50; margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
    input {
      width: 100%;
      padding: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: border-color 0.3s;
    }
    input:focus { outline: none; border-color: #667eea; }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
    .btn:active { transform: translateY(0); }
    .btn-logout {
      background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
      margin-top: 30px;
    }
    .btn-logout:hover { box-shadow: 0 8px 20px rgba(231, 76, 60, 0.4); }
    .error-msg { color: #e74c3c; text-align: center; margin-bottom: 20px; display: none; font-size: 14px; }
    .user-info {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .user-info p { margin: 10px 0; color: #555; }
    .user-info span { color: #2c3e50; font-weight: 600; }
    .menu {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .menu-item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .menu-item:hover { transform: scale(1.05); }
    .menu-item h3 { font-size: 16px; margin-bottom: 5px; }
    .menu-item p { font-size: 12px; opacity: 0.8; }
    .status { text-align: center; padding: 10px; background: #d4edda; color: #155724; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="login-box" id="loginBox">
      <h1>🔐 管理登录</h1>
      <div class="error-msg" id="errorMsg"></div>
      <form id="loginForm">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn">登 录</button>
      </form>
    </div>

    <div class="dashboard-box" id="dashboardBox">
      <h1>📊 管理后台</h1>
      <div class="status" id="status">✅ 已登录</div>
      <div class="user-info">
        <p>👤 用户名：<span id="userName"></span></p>
        <p>🕐 登录时间：<span id="loginTime"></span></p>
        <p>🔑 登录方式：<span>密码登录</span></p>
      </div>
      <div class="menu">
        <div class="menu-item">
          <h3>📦 商品管理</h3>
          <p>管理系统商品</p>
        </div>
        <div class="menu-item">
          <h3>👥 用户管理</h3>
          <p>管理注册用户</p>
        </div>
        <div class="menu-item">
          <h3>📈 数据统计</h3>
          <p>查看运营数据</p>
        </div>
        <div class="menu-item">
          <h3>⚙️ 系统设置</h3>
          <p>系统配置管理</p>
        </div>
      </div>
      <button class="btn btn-logout" onclick="logout()">退 出 登 录</button>
    </div>
  </div>

  <script>
    const loginBox = document.getElementById('loginBox');
    const dashboardBox = document.getElementById('dashboardBox');
    const loginForm = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const statusDiv = document.getElementById('status');

    function checkLogin() {
      const token = localStorage.getItem('token');
      if (token) {
        showDashboard();
      } else {
        showLogin();
      }
    }

    function showLogin() {
      loginBox.style.display = 'block';
      dashboardBox.style.display = 'none';
    }

    function showDashboard() {
      loginBox.style.display = 'none';
      dashboardBox.style.display = 'block';
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      document.getElementById('userName').textContent = user.username || '未知用户';
      document.getElementById('loginTime').textContent = user.loginTime || new Date().toLocaleString();
    }

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.code === 200) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify({
            username: data.username,
            loginTime: new Date().toLocaleString()
          }));
          showDashboard();
        } else {
          errorMsg.textContent = data.message || '登录失败，请检查用户名和密码';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = '❌ 网络错误，请检查服务器连接';
        errorMsg.style.display = 'block';
      }
    });

    async function logout() {
      try {
        await fetch('/api/logout', { method: 'POST' });
      } catch (e) {}
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      showLogin();
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
    }

    checkLogin();
  </script>
</body>
</html>
