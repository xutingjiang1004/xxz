<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的第一个互联网站</title>
  <style>
    body { font-family: 微软雅黑; text-align: center; padding-top: 100px; }
    h1 { color: #2c3e50; }
    .success { color: #27ae60; font-size: 20px; margin-top: 30px; }
    .error { color: #e74c3c; font-size: 20px; margin-top: 30px; }
  </style>
</head>
<body>
  <h1>🌐 我的互联网站测试页</h1>
  <div id="result">正在连接后端...</div>

  <script>
    fetch('/api/hello')
      .then(res => res.json())
      .then(data => {
        document.getElementById('result').className = 'success';
        document.getElementById('result').innerText = data.message;
      })
      .catch(err => {
        document.getElementById('result').className = 'error';
        document.getElementById('result').innerText = "❌ 后端连接失败，请检查服务是否启动";
      });
  </script>
</body>
</html>
