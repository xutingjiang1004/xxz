<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互联朋友圈</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "微软雅黑", sans-serif;
    }
    body {
      background-color: #f5f5f5;
      padding-bottom: 80px;
    }
    .header {
      background-color: #fff;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 {
      font-size: 20px;
      color: #333;
    }
    .publish-card {
      background-color: #fff;
      margin: 16px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .publish-card input,
    .publish-card textarea {
      width: 100%;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 14px;
      outline: none;
      resize: none;
    }
    .publish-card textarea {
      min-height: 80px;
    }
    .publish-btn {
      background-color: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 14px;
      cursor: pointer;
      float: right;
    }
    .post-list {
      margin-top: 16px;
    }
    .post-card {
      background-color: #fff;
      margin: 0 16px 16px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: #007aff;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      margin-right: 12px;
    }
    .nickname {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .post-time {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }
    .post-content {
      font-size: 15px;
      color: #333;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .post-stats {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 0;
      border-top: 1px solid #f5f5f5;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
      color: #666;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .stat-item:hover {
      color: #007aff;
    }
    .comment-section {
      margin-top: 12px;
    }
    .comment-input-box {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .comment-input {
      flex: 1;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
    }
    .comment-btn {
      background-color: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 16px;
      font-size: 13px;
      cursor: pointer;
    }
    .comment-list {
      margin-top: 12px;
    }
    .comment-item {
      padding: 8px 0;
      border-bottom: 1px solid #fafafa;
    }
    .comment-nickname {
      font-size: 13px;
      font-weight: 600;
      color: #007aff;
    }
    .comment-content {
      font-size: 13px;
      color: #333;
      margin-top: 4px;
    }
    .clearfix::after {
      content: "";
      clear: both;
      display: table;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>互联朋友圈</h1>
  </div>

  <div class="publish-card clearfix">
    <input type="text" id="nickname" placeholder="你的昵称（选填，默认匿名）">
    <textarea id="postContent" placeholder="分享你的动态..."></textarea>
    <button class="publish-btn" onclick="publishPost()">发布动态</button>
  </div>

  <div class="post-list" id="postList">
    <!-- 动态列表会在这里自动渲染 -->
  </div>

  <script>
    // 页面加载时获取所有动态
    window.onload = function() {
      loadPosts();
    };

    // 加载所有动态
    async function loadPosts() {
      try {
        const res = await fetch('/api/posts');
        const result = await res.json();
        if (result.code === 200) {
          renderPosts(result.data);
        }
      } catch (err) {
        console.error('加载动态失败', err);
      }
    }

    // 渲染动态列表
    function renderPosts(posts) {
      const postList = document.getElementById('postList');
      if (posts.length === 0) {
        postList.innerHTML = '<div style="text-align:center;padding:40px;color:#999;">暂无动态，快来发布第一条吧！</div>';
        return;
      }

      let html = '';
      posts.forEach(post => {
        // 格式化时间
        const time = new Date(post.createTime).toLocaleString();
        // 渲染评论
        let commentHtml = '';
        post.comments.forEach(comment => {
          commentHtml += `
            <div class="comment-item">
              <div class="comment-nickname">${comment.nickname}</div>
              <div class="comment-content">${comment.content}</div>
            </div>
          `;
        });

        html += `
          <div class="post-card" id="post-${post.id}">
            <div class="post-header">
              <div class="avatar">${post.nickname.charAt(0) || '匿'}</div>
              <div>
                <div class="nickname">${post.nickname}</div>
                <div class="post-time">${time}</div>
              </div>
            </div>
            <div class="post-content">${post.content}</div>
            <div class="post-stats">
              <div class="stat-item" onclick="likePost(${post.id})">
                <span>👍</span>
                <span id="like-count-${post.id}">${post.likeCount}</span>
                <span>点赞</span>
              </div>
              <div class="stat-item" onclick="viewPost(${post.id})">
                <span>👀</span>
                <span id="view-count-${post.id}">${post.viewCount}</span>
                <span>浏览</span>
              </div>
              <div class="stat-item">
                <span>💬</span>
                <span>${post.comments.length}</span>
                <span>评论</span>
              </div>
            </div>
            <div class="comment-section">
              <div class="comment-list">${commentHtml}</div>
              <div class="comment-input-box">
                <input type="text" class="comment-input" id="comment-nickname-${post.id}" placeholder="你的昵称">
                <input type="text" class="comment-input" id="comment-content-${post.id}" placeholder="写下你的评论...">
                <button class="comment-btn" onclick="addComment(${post.id})">发送</button>
              </div>
            </div>
          </div>
        `;
      });
      postList.innerHTML = html;
    }

    // 发布动态
    async function publishPost() {
      const nickname = document.getElementById('nickname').value.trim();
      const content = document.getElementById('postContent').value.trim();
      
      if (!content) {
        alert('请输入动态内容');
        return;
      }

      try {
        const res = await fetch('/api/posts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, content })
        });
        const result = await res.json();
        if (result.code === 200) {
          alert('发布成功！');
          document.getElementById('postContent').value = '';
          loadPosts(); // 重新加载列表
        } else {
          alert(result.message);
        }
      } catch (err) {
        console.error('发布失败', err);
        alert('发布失败，请重试');
      }
    }

    // 点赞
    async function likePost(postId) {
      try {
        const res = await fetch(`/api/posts/${postId}/like`, { method: 'POST' });
        const result = await res.json();
        if (result.code === 200) {
          document.getElementById(`like-count-${postId}`).innerText = result.data.likeCount;
        }
      } catch (err) {
        console.error('点赞失败', err);
      }
    }

    // 增加浏览量
    async function viewPost(postId) {
      try {
        const res = await fetch(`/api/posts/${postId}/view`, { method: 'POST' });
        const result = await res.json();
        if (result.code === 200) {
          document.getElementById(`view-count-${postId}`).innerText = result.data.viewCount;
        }
      } catch (err) {
        console.error('更新浏览量失败', err);
      }
    }

    // 添加评论
    async function addComment(postId) {
      const nickname = document.getElementById(`comment-nickname-${postId}`).value.trim();
      const content = document.getElementById(`comment-content-${postId}`).value.trim();
      
      if (!content) {
        alert('请输入评论内容');
        return;
      }

      try {
        const res = await fetch(`/api/posts/${postId}/comments`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nickname, content })
        });
        const result = await res.json();
        if (result.code === 200) {
          document.getElementById(`comment-content-${postId}`).value = '';
          loadPosts(); // 重新加载列表
        } else {
          alert(result.message);
        }
      } catch (err) {
        console.error('评论失败', err);
        alert('评论失败，请重试');
      }
    }
  </script>
</body>
</html>
